<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POST Lab - FastAPI</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <header>
        <div>
            <p class="eyebrow">POST</p>
            <h1>Cadastro de leads</h1>
            <p>Use esta tela para praticar cadastro antes de ligar o formulário ao FastAPI.</p>
        </div>
        <span class="badge">Body JSON</span>
    </header>

    <main>
        <section class="panel form-panel">
            <h2>Novo lead</h2>
            <form>
                <label>
                    Nome
                    <input id="nome" type="text" name="nome" placeholder="Industria Beta" required>
                </label>

                <label>
                    Origem
                    <input id="origem" name="origem" placeholder="Linkedin">
                </label>

                <label>
                    Score
                    <input id="score" type="number" name="score" placeholder="87.5" step="0.1" required>
                </label>

                <button type="button" id="cadastro">Cadastrar lead via API</button>
            </form>
        </section>

        <section class="panel leads-panel">
            <div class="panel-title">
                <div>
                    <h2>Leads cadastrados</h2>
                </div>
                <button id="atualizar" class="secondary-button" type="button">Atualizar lista</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Origem</th>
                            <th>Score</th>
                            <th>Cadastrado em</th>
                        </tr>
                    </thead>
                    <tbody id="leads-tabela">
                        <tr>
                            <td colspan="4" class="empty-row">Nenhum lead cadastrado ainda.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="/frontend/script.js"></script>
</body>
</html>
