<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Data Lab</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #1f2937;
        }

        header {
            background: #0f172a;
            color: white;
            padding: 24px;
        }

        main {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            padding: 20px;
        }

        aside,
        section {
            background: white;
            border: 1px solid #d9e0e8;
            border-radius: 8px;
            padding: 16px;
        }

        button {
            width: 100%;
            margin-bottom: 10px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #ffffff;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
        }

        button:hover {
            background: #eef2f7;
        }

        pre {
            min-height: 320px;
            overflow: auto;
            background: #111827;
            color: #d1fae5;
            border-radius: 8px;
            padding: 16px;
            font-size: 14px;
        }

        .endpoint {
            color: #64748b;
            font-size: 13px;
        }

        @media (max-width: 800px) {
            main {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>FastAPI Data Lab</h1>
        <p>Painel simples para testar endpoints da sua API.</p>
    </header>

    <main>
        <aside>
            <h2>Endpoints</h2>
            <button onclick="chamarApi('/status')">
                Status da API
                <div class="endpoint">GET /status</div>
            </button>
            <button onclick="chamarApi('/versao')">
                Versao da API
                <div class="endpoint">GET /versao</div>
            </button>
            <button onclick="chamarApi('/indicadores/vendas')">
                Indicadores de vendas
                <div class="endpoint">GET /indicadores/vendas</div>
            </button>
            <button onclick="chamarApi('/clientes/inativos')">
                Clientes inativos
                <div class="endpoint">GET /clientes/inativos</div>
            </button>
        </aside>

        <section>
            <h2>Resposta da API</h2>
            <pre id="resultado">Clique em um endpoint para testar.</pre>
        </section>
    </main>

    <script>
        async function chamarApi(endpoint) {
            const resposta = await fetch(endpoint);
            const dados = await resposta.json();
            document.getElementById("resultado").textContent = JSON.stringify(dados, null, 4);
        }
    </script>
</body>
</html>
