<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Data Lab</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <header>
        <h1>FastAPI Data Lab</h1>
        <p>Painel simples para testar endpoints da sua API.</p>
    </header>

    <main>
        <aside>
            <h2>Endpoints</h2>
            <button onclick="chamarApi('/status')">
                Status da API
                <div class="endpoint">GET /status</div>
            </button>
            <button onclick="chamarApi('/versao')">
                Versao da API
                <div class="endpoint">GET /versao</div>
            </button>
            <button onclick="chamarApi('/indicadores/vendas')">
                Indicadores de vendas
                <div class="endpoint">GET /indicadores/vendas</div>
            </button>
            <button onclick="chamarApi('/clientes/inativos')">
                Clientes inativos
                <div class="endpoint">GET /clientes/inativos</div>
            </button>
            <button onclick="chamarApi('/logistica/lead-time')">
                Lead Time
                <div class="endpoint">GET /logistica/lead-time</div>
            </button>
        </aside>

        <section>
            <h2>Resposta da API</h2>
            <pre id="resultado">Clique em um endpoint para testar.</pre>
        </section>
    </main>

    <script src="/frontend/script.js"></script>
</body>
</html>
